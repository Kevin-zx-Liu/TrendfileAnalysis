<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment Data Viewer</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f7f6; }
        .container { max-width: 100%; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        input[type="file"] { padding: 10px; }
        
        /* Table Styles */
        .table-container { overflow-x: auto; max-height: 700px; overflow-y: auto; }
        table { border-collapse: collapse; min-width: 100%; font-size: 13px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; vertical-align: top; }
        th { background-color: #007bff; color: white; position: sticky; top: 0; z-index: 2; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        /* Formatted Parameter Styles */
        .param-item { border-bottom: 1px solid #eee; padding: 3px 0; }
        .param-item:last-child { border-bottom: none; }
        .param-name { font-weight: bold; color: #444; }
        .param-value { color: #0066cc; }
    </style>
</head>
<body>

<div class="container">
    <h1>Equipment Data Viewer</h1>

    <div class="section">
        <h2>1. Upload CSV File</h2>
        <input type="file" id="csvFileInput" accept=".csv">
    </div>

    <div class="section">
        <h2>Data Browser</h2>
        <div class="table-container">
            <table id="dataTable">
                <thead id="dataHead"></thead>
                <tbody id="dataBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.getElementById('csvFileInput').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (!file) return;

        // Clear previous data
        document.getElementById('dataHead').innerHTML = '';
        document.getElementById('dataBody').innerHTML = '<tr><td>Loading and processing data...</td></tr>';

        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            
            // Use our custom, robust parser
            const rows = parseEquipmentCSV(text);
            
            if (rows.length > 0) {
                const headers = rows[0];
                const data = rows.slice(1);
                displayData(data, headers);
            }
        };
        reader.readAsText(file);
    });

    // CUSTOM PARSER: Handles the exact \" format of your equipment logs
    function parseEquipmentCSV(text) {
        const rows = [];
        let currentRow = [];
        let currentCell = '';
        let inQuotes = false;

        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            
            // 1. Handle escaped quotes (e.g., \")
            // This turns [{\"Name\":...] directly into [{"Name":...] inside the cell
            if (char === '\\' && text[i+1] === '"') {
                currentCell += '"';
                i++; // Skip the next character so it doesn't trigger inQuotes
            } 
            // 2. Handle standard double-escaped quotes ("") just in case
            else if (char === '"' && text[i+1] === '"') {
                currentCell += '"';
                i++; 
            }
            // 3. Toggle being inside or outside a column wrapper
            else if (char === '"') {
                inQuotes = !inQuotes;
            } 
            // 4. End of a cell (comma outside of quotes)
            else if (char === ',' && !inQuotes) {
                currentRow.push(currentCell);
                currentCell = '';
            } 
            // 5. End of a row (newline outside of quotes)
            else if ((char === '\n' || char === '\r') && !inQuotes) {
                if (char === '\r' && text[i+1] === '\n') i++; // Handle Windows \r\n
                currentRow.push(currentCell);
                
                // Only add if the row isn't completely empty
                if (currentRow.some(cell => cell.trim() !== '')) {
                    rows.push(currentRow);
                }
                currentRow = [];
                currentCell = '';
            } 
            // 6. Normal character
            else {
                currentCell += char;
            }
        }
        
        // Push the very last cell/row if the file doesn't end with a neat newline
        if (currentCell || currentRow.length > 0) {
            currentRow.push(currentCell);
            if (currentRow.some(cell => cell.trim() !== '')) {
                rows.push(currentRow);
            }
        }
        
        return rows;
    }

    // Displays the data nicely in the HTML table
    function displayData(data, headers) {
        const thead = document.getElementById('dataHead');
        const tbody = document.getElementById('dataBody');
        tbody.innerHTML = ''; // Clear loading text

        // Render Headers
        let headerRow = '<tr>';
        headers.forEach(header => {
            headerRow += `<th>${header}</th>`;
        });
        headerRow += '</tr>';
        thead.innerHTML = headerRow;

        // Render Rows (Limit to 100 to keep the browser fast)
        const limit = Math.min(data.length, 100); 
        for (let i = 0; i < limit; i++) {
            let rowHtml = '<tr>';
            
            for (let j = 0; j < headers.length; j++) {
                let rawText = data[i][j] || '';
                let formattedHtml = formatCellData(rawText);
                rowHtml += `<td>${formattedHtml}</td>`;
            }
            
            rowHtml += '</tr>';
            tbody.innerHTML += rowHtml;
        }
    }

    // Tries to format the JSON arrays into clean "Name: Value" lists
    function formatCellData(text) {
        let cleanText = text.trim();
        
        // Check if it's our target array format
        if (cleanText.startsWith('[') && cleanText.endsWith(']')) {
            try {
                let parsed = JSON.parse(cleanText);
                if (Array.isArray(parsed)) {
                    // It's valid JSON! Make it look beautiful.
                    return parsed.map(item => {
                        let name = item.Name ? item.Name : 'Unknown';
                        let val = item.hasOwnProperty('Value') ? item.Value : '';
                        return `<div class="param-item"><span class="param-name">${name}:</span> <span class="param-value">${val}</span></div>`;
                    }).join('');
                }
            } catch (e) {
                // If the JSON is somehow still malformed, just safely show the raw text
                return cleanText.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            }
        }
        
        // Regular text cells (Dates, IDs, etc.)
        return cleanText.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
</script>

</body>
</html>
